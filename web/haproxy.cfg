global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  forwardfor
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend web
    bind *:80
    default_backend static

    # API → backend (strip /api prefix)
    acl is_api path_beg /api/
    http-request set-path %[path,regsub(^/api,,)] if is_api
    use_backend api if is_api

backend api
    option httpchk GET /healthz
    http-check expect status 200
    http-request set-header X-Forwarded-Proto %[ssl_fc,iif(https,http)]
    server backend server:8080 check

backend static
    # SPA fallback: rewrite to /index.html unless path looks like a real asset
    http-request set-path /index.html unless { path_reg ^/[^?]*\.(css|js|mjs|map|json|ico|png|jpg|jpeg|gif|svg|webp|avif|woff|woff2|ttf|otf|eot|wasm|txt|xml|webmanifest)$ }
    server static localhost:8081 check
